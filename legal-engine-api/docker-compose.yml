services:
  legal-engine-api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      LEGAL_ENGINE_DATABASE_PATH: /data/legal_engine.sqlite3
      LEGAL_SOURCE_POLICY_PATH: /docs/legal-ai/source-policy.yml
      LEGAL_ENGINE_ADMIN_TOKEN: ${LEGAL_ENGINE_ADMIN_TOKEN:?Set LEGAL_ENGINE_ADMIN_TOKEN before starting legal-engine-api}
    volumes:
      - legal-engine-data:/data
      - ../docs/legal-ai:/docs/legal-ai:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  legal-engine-data:
