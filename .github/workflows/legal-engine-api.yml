name: Legal Engine API

on:
  pull_request:
    paths:
      - "legal-engine-api/**"
      - "docs/legal-ai/**"
      - ".github/workflows/legal-engine-api.yml"
  push:
    branches:
      - main
    paths:
      - "legal-engine-api/**"
      - "docs/legal-ai/**"
      - ".github/workflows/legal-engine-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legal-engine-api-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Tests, lint and evaluation gates
    runs-on: depot-ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: legal-engine-api/uv.lock

      - name: Check UV lockfile
        run: uv lock --project legal-engine-api --check

      - name: Install dependencies
        run: uv sync --project legal-engine-api --group dev

      - name: Ruff check
        run: uv run --project legal-engine-api ruff check legal-engine-api/app legal-engine-api/tests

      - name: Ruff format check
        run: uv run --project legal-engine-api ruff format --check legal-engine-api/app legal-engine-api/tests

      - name: Pytest
        run: uv run --project legal-engine-api pytest legal-engine-api/tests

      - name: Deterministic evaluation quality gates
        run: uv run --project legal-engine-api legal-eval
