openapi: 3.1.0
info:
  title: Legal Engine API
  version: 0.1.0
  description: API contract for the legal evidence, retrieval, validation and ingestion engine.
servers:
  - url: https://legal-engine.example.com
    description: Production
  - url: http://localhost:8000
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  source_policy_name:
                    type: string
                  source_policy_version:
                    type: integer
  /source-policy/check-url:
    post:
      summary: Check URL against the legal source policy
      operationId: checkSourcePolicyUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourcePolicyCheckRequest"
      responses:
        "200":
          description: Source policy classification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePolicyCheckResult"
  /query/classify:
    post:
      summary: Classify legal query
      operationId: classifyQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyQueryRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyQueryResponse"
  /retrieval/search:
    post:
      summary: Search legal corpus with local hybrid retrieval
      operationId: searchRetrieval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalSearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalSearchResponse"
  /retrieval/rerank:
    post:
      summary: Rerank candidate chunks
      operationId: rerankRetrieval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerankRequest"
      responses:
        "200":
          description: Reranked results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerankResponse"
  /evidence/build:
    post:
      summary: Build evidence package for generation
      operationId: buildEvidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceBuildRequest"
      responses:
        "200":
          description: Evidence package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBuildResponse"
  /answer/generate:
    post:
      summary: Generate draft answer from evidence
      operationId: generateAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerGenerateRequest"
      responses:
        "200":
          description: Draft answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerGenerateResponse"
  /answer/validate:
    post:
      summary: Validate draft answer against evidence
      operationId: validateAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerValidateResponse"
  /chat/answer:
    post:
      summary: Execute the orchestrated source-grounded chat answer pipeline
      operationId: answerChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatAnswerRequest"
      responses:
        "200":
          description: Final guarded answer with evidence, verdict and audit identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAnswerResponse"
  /feedback/answer:
    post:
      summary: Submit feedback for a persisted answer audit
      operationId: createAnswerFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerFeedbackRequest"
      responses:
        "201":
          description: Persisted answer feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerFeedback"
        "404":
          description: Answer audit not found
  /ingestion/source:
    post:
      summary: Ingest source document or official URL
      operationId: ingestSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestionSourceRequest"
      responses:
        "202":
          description: Ingestion job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
  /ingestion/crawl-url:
    post:
      summary: Fetch and ingest a supported official URL
      operationId: crawlUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlUrlRequest"
      responses:
        "202":
          description: Crawl job accepted, completed, or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
  /ingestion/promote:
    post:
      summary: Promote validated document to chat_ready
      operationId: promoteDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteDocumentRequest"
      responses:
        "200":
          description: Promotion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoteDocumentResponse"
  /admin/reindex:
    post:
      summary: Reindex corpus or subset
      operationId: reindexCorpus
      security:
        - AdminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReindexRequest"
      responses:
        "202":
          description: Reindex job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
  /admin/provider-readiness:
    get:
      summary: Check configured external provider requirements without exposing secret values
      operationId: getProviderReadiness
      security:
        - AdminTokenAuth: []
      responses:
        "200":
          description: External provider readiness report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProviderReadinessResponse"
  /admin/corpus/seed:
    post:
      summary: Seed the deterministic initial local corpus
      operationId: seedInitialCorpus
      security:
        - AdminTokenAuth: []
      responses:
        "202":
          description: Initial corpus seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitialCorpusSeedResponse"
  /admin/documents:
    get:
      summary: List legal documents for admin review
      operationId: listLegalDocuments
      security:
        - AdminTokenAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_review, chat_ready, rejected, archived]
        - name: source
          in: query
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
        - name: document_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Legal document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalDocumentListResponse"
  /admin/documents/review-queue:
    get:
      summary: List pending documents with review blockers
      operationId: listLegalDocumentReviewQueue
      security:
        - AdminTokenAuth: []
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
        - name: document_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Pending review document queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDocumentReviewQueueResponse"
  /admin/documents/{document_id}:
    get:
      summary: Retrieve a legal document
      operationId: getLegalDocument
      security:
        - AdminTokenAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Legal document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalDocumentResponse"
        "404":
          description: Document not found
  /admin/documents/{document_id}/chunks:
    get:
      summary: List chunks for a legal document
      operationId: listLegalDocumentChunks
      security:
        - AdminTokenAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Legal document chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalChunkListResponse"
        "404":
          description: Document not found
  /admin/documents/{document_id}/raw-text:
    get:
      summary: Retrieve raw text for a legal document under admin review
      operationId: getLegalDocumentRawText
      security:
        - AdminTokenAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Legal document raw text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalDocumentRawTextResponse"
        "404":
          description: Document or raw text not found
  /admin/documents/{document_id}/status:
    post:
      summary: Update legal document status
      operationId: updateLegalDocumentStatus
      security:
        - AdminTokenAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDocumentStatusRequest"
      responses:
        "200":
          description: Updated legal document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDocumentStatusResponse"
        "404":
          description: Document not found
        "409":
          description: Document cannot be promoted to chat_ready
        "422":
          description: Missing or invalid review note
  /admin/audits:
    get:
      summary: List answer audit summaries
      operationId: listAnswerAudits
      security:
        - AdminTokenAuth: []
      parameters:
        - name: verdict
          in: query
          schema:
            type: string
            enum: [pass, abstain, fail]
        - name: session_id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Answer audit summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerAuditListResponse"
  /admin/audit/{answer_id}:
    get:
      summary: Retrieve answer audit
      operationId: getAnswerAudit
      security:
        - AdminTokenAuth: []
      parameters:
        - name: answer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerAudit"
        "404":
          description: Audit record not found
  /admin/feedback:
    get:
      summary: List answer feedback for admin review
      operationId: listAnswerFeedback
      security:
        - AdminTokenAuth: []
      parameters:
        - name: audit_id
          in: query
          schema:
            type: string
            format: uuid
        - name: rating
          in: query
          schema:
            type: string
            enum: [positive, negative, neutral]
        - name: category
          in: query
          schema:
            type: string
            enum: [wrong_source, incomplete_answer, legal_error, too_vague, outdated_source, other]
        - name: session_id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Answer feedback list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerFeedbackListResponse"
  /admin/feedback/triage:
    get:
      summary: List negative answer feedback with audit context for legal triage
      operationId: listAnswerFeedbackTriage
      security:
        - AdminTokenAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [wrong_source, incomplete_answer, legal_error, too_vague, outdated_source, other]
        - name: session_id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Negative feedback triage list with answer audit context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerFeedbackTriageResponse"
  /admin/ingestion/jobs:
    get:
      summary: List ingestion, crawl and reindex jobs
      operationId: listIngestionJobs
      security:
        - AdminTokenAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, rejected]
        - name: mode
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Ingestion job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobListResponse"
  /admin/ingestion/jobs/{job_id}:
    get:
      summary: Retrieve an ingestion, crawl or reindex job
      operationId: getIngestionJob
      security:
        - AdminTokenAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ingestion job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobDetailResponse"
        "404":
          description: Ingestion job not found
  /admin/evaluation/run:
    post:
      summary: Run deterministic evaluation quality gates and persist the run
      operationId: runEvaluation
      security:
        - AdminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationRunRequest"
      responses:
        "200":
          description: Persisted evaluation run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResponse"
  /admin/evaluation/runs:
    get:
      summary: List persisted evaluation runs
      operationId: listEvaluationRuns
      security:
        - AdminTokenAuth: []
      parameters:
        - name: passed
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Evaluation run summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunListResponse"
  /admin/evaluation/runs/{run_id}:
    get:
      summary: Retrieve a persisted evaluation run
      operationId: getEvaluationRun
      security:
        - AdminTokenAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Persisted evaluation run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResponse"
        "404":
          description: Evaluation run not found
components:
  securitySchemes:
    AdminTokenAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
  schemas:
    SourcePolicyCheckRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
    SourcePolicyAuthority:
      type: object
      properties:
        jurisdiction:
          type: string
        source:
          type: string
        domain:
          type: string
        allowed_document_types:
          type: array
          items:
            type: string
        may_ground_answer:
          type: boolean
        requires_consolidation_warning:
          type: boolean
        required_metadata:
          type: array
          items:
            type: string
        required_identifiers_any:
          type: array
          items:
            type: string
    SourcePolicyCheckResult:
      type: object
      required:
        - status
        - may_ground_answer
        - reason
      properties:
        status:
          type: string
          enum: [official_authority, discovery_only, blocked, unknown_domain, invalid_url]
        domain:
          type: string
        may_ground_answer:
          type: boolean
        reason:
          type: string
        authority:
          $ref: "#/components/schemas/SourcePolicyAuthority"
    ClassifyQueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        mode:
          type: string
          enum: [strict, assisted, exploration]
          default: strict
    ClassifyQueryResponse:
      type: object
      required:
        - jurisdiction
        - area
        - document_types
        - current_only
      properties:
        jurisdiction:
          type: array
          items:
            type: string
        area:
          type: array
          items:
            type: string
        document_types:
          type: array
          items:
            type: string
        current_only:
          type: boolean
        requires_case_law:
          type: boolean
        requires_procurement_data:
          type: boolean
        high_risk:
          type: boolean
        query_rewrite:
          type: string
    RetrievalSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        jurisdiction:
          type: array
          items:
            type: string
        area:
          type: array
          items:
            type: string
        document_types:
          type: array
          items:
            type: string
        current_only:
          type: boolean
          default: true
        top_k_dense:
          type: integer
          default: 40
        top_k_sparse:
          type: integer
          default: 40
        mode:
          type: string
          enum: [strict, assisted, exploration]
          default: strict
    RetrievalSearchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
    RetrievalResult:
      type: object
      required:
        - chunk_id
        - document_id
        - source
        - source_url
        - text
        - score
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        source:
          type: string
        jurisdiction:
          type: string
        document_type:
          type: string
        area:
          type: array
          items:
            type: string
        legal_metadata:
          type: object
          additionalProperties:
            type: string
        citation_label:
          type: string
        source_url:
          type: string
          format: uri
        is_current:
          type: boolean
        is_consolidated:
          type: boolean
        text:
          type: string
        score:
          type: number
    RerankRequest:
      type: object
      required:
        - query
        - results
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
        top_n:
          type: integer
          default: 12
    RerankResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
    EvidenceBuildRequest:
      type: object
      required:
        - query
        - results
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
    EvidenceBuildResponse:
      type: object
      required:
        - evidence
        - warnings
      properties:
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        warnings:
          type: array
          items:
            type: string
    EvidenceItem:
      type: object
      required:
        - chunk_id
        - citation_label
        - text
        - source_url
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        citation_label:
          type: string
        text:
          type: string
        source_url:
          type: string
          format: uri
        canonical_url:
          type: string
          format: uri
        source:
          type: string
        jurisdiction:
          type: string
        document_type:
          type: string
        legal_metadata:
          type: object
          additionalProperties:
            type: string
        is_current:
          type: boolean
        is_consolidated:
          type: boolean
        legal_value_warning:
          type: string
    AnswerGenerateRequest:
      type: object
      required:
        - question
        - evidence
      properties:
        question:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        mode:
          type: string
          enum: [strict, assisted, exploration]
          default: strict
    AnswerGenerateResponse:
      type: object
      required:
        - draft_answer
      properties:
        draft_answer:
          type: string
    AnswerValidateRequest:
      type: object
      required:
        - question
        - draft_answer
        - evidence
      properties:
        question:
          type: string
        draft_answer:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
    AnswerValidateResponse:
      type: object
      required:
        - verdict
        - final_safe_answer
      properties:
        verdict:
          type: string
          enum: [pass, abstain, fail]
        unsupported_claims:
          type: array
          items:
            type: string
        missing_citations:
          type: array
          items:
            type: string
        wrong_version_risk:
          type: boolean
        hallucinated_identifiers:
          type: array
          items:
            type: string
        final_safe_answer:
          type: string
    PipelineStepTrace:
      type: object
      required:
        - step
        - status
      properties:
        step:
          type: string
        status:
          type: string
        detail:
          type: string
    ChatAnswerRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
        session_id:
          type: string
        user_id:
          type: string
        mode:
          type: string
          enum: [strict, assisted, exploration]
          default: strict
        jurisdiction:
          type: array
          items:
            type: string
        document_types:
          type: array
          items:
            type: string
        current_only:
          type: boolean
        top_k_dense:
          type: integer
          default: 40
        top_k_sparse:
          type: integer
          default: 40
        top_n:
          type: integer
          default: 8
    ChatAnswerResponse:
      type: object
      required:
        - answer
        - verdict
        - classification
        - evidence
      properties:
        audit_id:
          type: string
          format: uuid
        answer:
          type: string
        verdict:
          type: string
